    <main class="O_Test O_Test-Exam">
      <div class="O_Test-ExamContent">
        <h4 class="A_Heading-H4 A_Question">
          Ты потерял тропу в лесу. Что делать первым?
        </h4>
        <div class="O_Test-ExamQuestions">
          <button class="M_Test-ExamQuestion" type="button" data-index="0">
            <div class="M_Test-Exam_Title">
              <img
                class="A_Test-ExamQuestionIcon"
                src="../../images/icons/Q_Icon_Body.svg"
                alt="Иконка человека"
              />
              <h4 class="A_Heading-H4 A_Test-ExamAnswerTitle">
                Продолжить идти
              </h4>
            </div>
            <p class="A_Paragraph_transparent A_Test-ExamAnswerDescription">
              Иногда кажется, что если продолжать двигаться, тропа снова
              появится. В лесу направление может меняться из-за неровностей
              рельефа
            </p>
          </button>
          <button class="M_Test-ExamQuestion" type="button" data-index="1">
            <div class="M_Test-Exam_Title">
              <img
                class="A_Test-ExamQuestionIcon"
                src="../../images/icons/Q_Icon_Hand.svg"
                alt="Иконка руки"
              />
              <h4 class="A_Heading-H4 A_Test-ExamAnswerTitle">
                Остановиться и осмотреться
              </h4>
            </div>
            <p class="A_Paragraph_transparent A_Test-ExamAnswerDescription">
              Иногда полезно сделать паузу и внимательно оглядеться вокруг. Так
              можно заметить ориентиры, следы тропы или особенности местности
            </p>
          </button>
          <button class="M_Test-ExamQuestion" type="button" data-index="2">
            <div class="M_Test-Exam_Title">
              <img
                class="A_Test-ExamQuestionIcon"
                src="../../images/icons/Q_Icon_Ear.svg"
                alt="Иконка уха"
              />
              <h4 class="A_Heading-H4 A_Test-ExamAnswerTitle">
                Позвать на помощь
              </h4>
            </div>
            <p class="A_Paragraph_transparent A_Test-ExamAnswerDescription">
              Можно попробовать подать голос или сигнал, если рядом есть люди.
              Такой способ иногда используют, чтобы привлечь внимание
            </p>
          </button>
          <button class="M_Test-ExamQuestion" type="button" data-index="3">
            <div class="M_Test-Exam_Title">
              <img
                class="A_Test-ExamQuestionIcon"
                src="../../images/icons/Q_Icon_RunningMan.svg"
                alt="Иконка бегущего человека"
              />
              <h4 class="A_Heading-H4 A_Test-ExamAnswerTitle">Идти быстрее</h4>
            </div>
            <p class="A_Paragraph_transparent A_Test-ExamAnswerDescription">
              В напряжённой ситуации люди нередко начинают двигаться быстрее.
              При этом важно следить за направлением и окружающей местностью
            </p>
          </button>
        </div>
      </div>
